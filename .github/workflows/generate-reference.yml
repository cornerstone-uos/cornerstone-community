name: Generate Docs from GDS/YAML

on:
  push:
    branches:
      - main # disabled for the current branch

permissions:
  contents: read


jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.DOCS_BOT_APP_ID }}
          private-key: ${{ secrets.DOCS_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            cornerstone-community
          permission-contents: write

      - name: Get GitHub App bot user ID
        id: app-user
        run: echo "user-id=$(gh api /users/${{ steps.app-token.outputs.app-slug }}[bot] --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Create venv
        run: uv venv .venv

      - name: Install dependencies
        run: uv sync --extra docs
      
      - name: Generate birdseye plots
        run: .venv/bin/python .github/scripts/generate-plots.py

      - name: Generate documentation
        run: .venv/bin/python .github/scripts/generate-docs.py
      
      - name: Check Git remote
        run: git remote -v
        

      - name: Push changes
        run: |
          git config --global user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          git add docs/
          git commit -m "Auto-generated documentation" || echo "No changes to commit"
          git push
