process_name: Student_SOI
foundry: CORNERSTONE
description: Academic MPW with single-etch depth and no metallisation
material: SOI
is_public: true
gds_type: only_real_gds
includes_heaters: false
includes_rf_layers: false
has_a_no_metals_option: true
gds_layers:
  - name: Si_Etch1_LF_120nm
    layer: [3, 0]
    description: Waveguide layer, defines both strip and rib. Layer will be protected.
    drc: { min_feature_size: 0.35, min_gap: 0.2}
    alias: wg_lf
  - name: Si_Etch1_DF_120nm
    layer: [4, 0]
    description: Waveguide layer, defines both strip and rib. Layer will be etched.
    drc: { min_feature_size: 0.2, min_gap: 0.35}
    alias: wg_df
  - name: Floorplan
    layer: [99, 0]
    is_info_only: true
    description: Cell outline
  - name: Label_Etch_DF
    layer: [100, 0]
    description: Labels (dark), will be etched, will not be checked in DRC
    drc: { min_feature_size: 0.25, min_gap: 0.25 }
layer_stack:
  - name: BOX
    description: BOX - buried oxide
    material: SiO2
    thickness: { value: 3.0 }
    gds_layer: null
  - name: Waveguide
    description: Waveguides (rib/strip)
    material: Si
    thickness: { value: 0.12, tol: 0.02 }
    gds_layer: (wg_lf or not wg_df)
  - name: Rib_Slab
    description: Slab portion of the rib waveguide
    material: Si
    thickness: { value: 0.1, tol: 0.02 }
    gds_layer: null
  - name: TOX
    description: Top cladding layer
    material: SiO2
    thickness: { value: 2.0, tol: 0.2 }
    gds_layer: null
